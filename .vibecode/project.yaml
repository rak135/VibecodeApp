# vibecode project configuration
# schema: vibecode/project/v1

project:
  id: vibecodeapp
  name: VibecodeApp
  root: .

indexing:
  include:
    - "*.py"
    - "*.js"
    - "*.jsx"
    - "*.ts"
    - "*.tsx"
    - "*.json"
    - "*.toml"
    - "*.yaml"
    - "*.yml"
    - "*.md"
    - "*.mdx"
    - "*.ini"
    - "*.cfg"
    - "*.env.example"
    - "Dockerfile"
    - "docker-compose.yml"
    - "Makefile"
    - "README*"
    - "AGENTS.md"
    - "package.json"
    - "package-lock.json"
    - "pnpm-lock.yaml"
    - "yarn.lock"
    - "bun.lockb"
    - "pyproject.toml"
    - "requirements*.txt"
    - "setup.cfg"
    - "setup.py"
    - "tsconfig*.json"
    - "vite.config.*"
    - "next.config.*"
    - "tailwind.config.*"
    - "postcss.config.*"
    - "eslint.config.*"
    - "prettier.config.*"
  exclude:
    - ".git/**"
    - "node_modules/**"
    - ".venv/**"
    - "venv/**"
    - "__pycache__/**"
    - "dist/**"
    - "build/**"
    - "coverage/**"
    - ".pytest_cache/**"
    - ".mypy_cache/**"
    - ".ruff_cache/**"
    - ".vibecode/current/**"
    - ".vibecode/runs/**"
    - ".vibecode/tmp/**"
    - ".vibecode/cache/**"
    - ".vibecode/logs/**"

protected_paths:
  - ".vibecode/architecture/**"
  - ".vibecode/handoff/**"
  - ".vibecode/history/**"

risk_rules: []
