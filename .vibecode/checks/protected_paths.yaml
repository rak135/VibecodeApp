# vibecode protected paths policy
# schema: vibecode/protected-paths/v1

protected_paths:
  - path: ".vibecode/architecture/"
    rule: "Edit only when the task explicitly changes architecture truth; preserve human-maintained docs."

  - path: ".vibecode/checks/"
    rule: "Edit only for check or policy tasks; keep human-maintained policies separate from generated artifacts."

  - path: ".vibecode/handoff/"
    rule: "Edit only to record current scope or handoff state; do not treat it as generated output."

  - path: ".vibecode/index/*"
    rule: "Generated index output; regenerate through index commands instead of manual edits. Only .vibecode/index/README.md and .vibecode/index/schema.json are human-maintained source truth."

  - path: ".vibecode/current/*"
    rule: "Runtime/session state; do not commit or treat as source truth."

  - path: "README.md"
    rule: "Manual-only until generated block markers are introduced; only README/docs tasks may change it."
    explicit_task_scope_required: false

  - path: "vibecode/indexer/scanner.py"
    rule: "Scanner semantics define repository inventory; require task scope and tests for path/include/exclude behavior."
    required_tests:
      - "python -m pytest tests/test_vibecode_indexer.py"

  - path: "vibecode/indexer/repo_tree.py"
    rule: "Repository tree rendering controls generated map output; require task scope and tests for tree output."
    required_tests:
      - "python -m pytest tests/test_vibecode_repo_tree.py"

  - path: "vibecode/context/scoring.py"
    rule: "Context relevance scoring controls agent context; require task scope and tests for ranking behavior."
    required_tests:
      - "python -m pytest tests/test_vibecode_relevant_files.py"

  - path: "vibecode/context/renderer.py"
    rule: "Context-pack rendering controls agent-facing output; require task scope and tests for rendered sections/limits."
    required_tests:
      - "python -m pytest tests/test_vibecode_context_pack.py"
