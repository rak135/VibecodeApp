# Ralphy Configuration
# https://github.com/michaelshimeles/ralphy

# Project info (auto-detected, edit if needed)
project:
  name: "VibecodeApp"
  language: "Python"
  framework: ""
  description: "Local repository architecture map and context-pack CLI."

# Commands (auto-detected from package.json/pyproject.toml)
commands:
  test: ""
  lint: ""
  build: ""

# Rules - instructions the AI MUST follow
# These are injected into every prompt
rules:
  - "Keep changes scoped to the active PRD task and avoid unrelated refactors."
  - "Do not implement an agent runtime until the repository map and context pack are working."
  - "Do not label the project scope as a numbered release."
  - "Keep human-maintained .vibecode files separate from generated index/current/log artifacts."

# Boundaries - files/folders the AI should not modify
boundaries:
  never_touch:
    - ".ralphy/progress.txt"
    - ".ralphy-worktrees/**"
    - ".ralphy-sandboxes/**"
